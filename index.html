<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Toy Dəvətnaməsi</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;600;800;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a2319;
            font-family: 'Montserrat', sans-serif;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('./images.jfif') center/cover no-repeat;
            filter: blur(3px);
            z-index: 0;
            transform: scale(1.05);
        }

        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(10, 35, 25, 0.6) 0%, rgba(17, 63, 41, 0.5) 55%, rgba(8, 36, 24, 0.7) 100%);
            z-index: 0;
        }

        /* Daimi konfet yağışı */
        .candy-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 2;
            pointer-events: none;
        }

        .falling-candy {
            position: absolute;
            top: -50px;
            background: radial-gradient(circle, #ffd700 0%, #dcb361 70%);
            border-radius: 50%;
            animation: fallDown linear infinite;
            opacity: 0.8;
        }

        @keyframes fallDown {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        #welcome-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.6s ease-out;
        }

        .welcome-heading {
            font-size: 3.5rem;
            color: #dcb361;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8), 0px 0px 20px rgba(220, 179, 97, 0.3);
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 40px;
            border: 3px solid #dcb361;
            padding: 25px 40px;
            border-radius: 15px;
            background: rgba(12, 62, 52, 0.7);
            backdrop-filter: blur(5px);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0px 0px 10px rgba(220, 179, 97, 0.3), 0px 10px 30px rgba(0, 0, 0, 0.4);
            }

            50% {
                box-shadow: 0px 0px 30px rgba(220, 179, 97, 0.6), 0px 20px 40px rgba(220, 179, 97, 0.2);
            }
        }

        #open-btn {
            font-family: 'Cinzel', serif;
            padding: 20px 70px;
            font-size: 2rem;
            font-weight: 900;
            color: #1a0a00;
            background: linear-gradient(135deg, #dcb361 0%, #f7e08e 50%, #dcb361 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6), inset 0px -4px 10px rgba(0, 0, 0, 0.2), inset 0px 4px 10px rgba(255, 255, 255, 0.7);
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
            z-index: 4;
            position: relative;
            overflow: hidden;
        }

        #open-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0px 25px 50px rgba(220, 179, 97, 0.5), 0px 0px 40px rgba(255, 255, 255, 0.4);
        }

        /* ========== ZƏRF VƏ KAĞIZ ANİMASİYASI (3.5 saniyə) ========== */
        .envelope-wrapper {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
            perspective: 2000px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .envelope-3d {
            width: 600px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            transform: translateY(100vh) scale(0.6);
            transition: transform 1s cubic-bezier(0.25, 1, 0.3, 1), opacity 0.4s ease;
        }

        .envelope-wrapper.step-1 .envelope-3d {
            transform: translateY(0) scale(1);
        }

        .env-back {
            position: absolute;
            inset: 0;
            background: #c1a37c;
            border-radius: 12px;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.85);
        }

        .env-front-left {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #d4b891, #ebd5b3);
            clip-path: polygon(0 0, 50% 50%, 0 100%);
            z-index: 3;
            border-radius: 12px;
        }

        .env-front-right {
            position: absolute;
            inset: 0;
            background: linear-gradient(to left, #d4b891, #ebd5b3);
            clip-path: polygon(100% 0, 50% 50%, 100% 100%);
            z-index: 3;
            border-radius: 12px;
        }

        .env-front-bottom {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #d4b891, #ebd5b3);
            clip-path: polygon(0 100%, 50% 50%, 100% 100%);
            z-index: 4;
            border-radius: 12px;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.2);
        }

        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to bottom, #ebd5b3, #c1a37c);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top;
            z-index: 5;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.3, 1);
        }

        .envelope-wrapper.step-2 .env-flap {
            transform: rotateX(-180deg);
            z-index: 1;
        }

        /* Kağızın zərfdən çıxması və üstündə ? ? ? yazılması */
        .env-letter {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 85%;
            background: #fffdf7;
            border: 2px dashed #dcb361;
            border-radius: 10px;
            z-index: 2;
            transform: translateY(0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 900;
            color: #0a2319;
            letter-spacing: 10px;
            text-shadow: 1px 1px 3px rgba(220, 179, 97, 0.4);
            transition: transform 1s cubic-bezier(0.25, 1, 0.3, 1);
        }

        .envelope-wrapper.step-3 .env-letter {
            transform: translateY(-200px);
        }

        .envelope-wrapper.fade-envelope .envelope-3d {
            opacity: 0;
            transform: scale(0.9);
        }

        /* ========== DƏVƏTNAMƏ KARTI (Ekrana doğru böyüyür) ========== */
        #invitation-card {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 30;
            perspective: 1500px;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card-glowing-wrapper {
            position: relative;
            width: 100%;
            max-width: 750px;
            padding: 6px;
            border-radius: 35px;
            overflow: hidden;
            transform: scale(0.2);
            opacity: 0;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.3, 1), opacity 0.6s ease;
        }

        .card-glowing-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #dcb361, #fff, #dcb361, transparent);
            animation: borderSpin 4s linear infinite;
            z-index: 1;
        }

        @keyframes borderSpin {
            100% {
                transform: rotate(360deg);
            }
        }

        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(12, 62, 52, 0.98) 0%, rgba(20, 80, 65, 0.98) 100%);
            border-radius: 30px;
            padding: 70px 50px;
            text-align: center;
            box-shadow: inset 0px 0px 30px rgba(0, 0, 0, 0.8);
            z-index: 2;
        }

        #invitation-card.open .card-glowing-wrapper {
            transform: scale(1);
            opacity: 1;
        }

        .guest-title {
            font-family: 'Cinzel', serif;
            font-size: 3.2rem;
            color: #a3ff81;
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.9);
        }

        .sender-heading {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            margin-top: 30px;
            color: #f6e08d;
            font-weight: 900;
        }

        .invitation-text {
            font-size: 1.5rem;
            color: #ffffff;
            line-height: 2;
            font-weight: 600;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9);
        }

        .close-btn {
            margin-top: 40px;
            padding: 18px 40px;
            background: linear-gradient(135deg, #dcb361 0%, #f6df98 100%);
            color: #0f3320;
            border: none;
            border-radius: 40px;
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .close-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(220, 179, 97, 0.6);
        }

        /* ========== 3D EKRANA DOĞRU UÇAN RƏNGLİ ZƏRLƏR ========== */
        .magic-glitter {
            position: fixed;
            top: 50%;
            left: 50%;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transform-style: preserve-3d;
        }

        .glitter-round {
            border-radius: 50%;
            box-shadow: 0 0 12px currentColor;
        }

        .glitter-strip {
            width: 7px;
            border-radius: 3px;
        }

        @keyframes explode3D {
            0% {
                transform: translate3d(0, 0, 0) scale(0.1) rotate(0deg);
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                transform: translate3d(var(--tx), var(--ty), var(--tz)) scale(var(--s)) rotate(var(--rot));
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .envelope-3d {
                width: 90%;
                height: 250px;
            }

            .guest-title {
                font-size: 2.2rem;
            }

            .invitation-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="candy-rain" id="candy-rain"></div>

    <div id="welcome-screen">
        <h1 class="welcome-heading" id="welcome-title">XOŞBƏXT MƏKAN ŞADLIQ SARAYI</h1>
        <button id="open-btn">DƏVƏTNAMƏNİ AÇ</button>
    </div>

    <!-- ZƏRF VƏ ? ? ? YAZILI KAĞIZ -->
    <div id="envelope-wrapper" class="envelope-wrapper">
        <div class="envelope-3d">
            <div class="env-back"></div>
            <div class="env-letter">? ? ?</div>
            <div class="env-front-left"></div>
            <div class="env-front-right"></div>
            <div class="env-front-bottom"></div>
            <div class="env-flap"></div>
        </div>
    </div>

    <!-- ƏSAS KART -->
    <div id="invitation-card">
        <div class="card-glowing-wrapper">
            <div class="card-content">
                <h1 class="guest-title" id="dynamic-guest-name">HÖRMƏTLİ QONAĞIMIZ</h1>
                <p class="invitation-text">Sizi oğlum Nurlanın toy məclisinə dəvət edirəm Məclis 4 Sentyabr 2026-cı il
                    saat 14:30-da Xaçmaz Rayonu Xoşbəxt Məkan şadlıq sarayında keçiriləcəkdir</p>
                <h1 class="sender-heading" id="sender-name">HÖRMƏTLƏ XALİD MÜƏLLİM</h1>
                <button class="close-btn bottom-close">DƏVƏTNAMƏNİ BAĞLA</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('dynamic-guest-name').textContent = 'HÖRMƏTLİ ' + (urlParams.get('ad') || 'QONAĞIMIZ').toUpperCase();
        document.getElementById('sender-name').textContent = 'HÖRMƏTLƏ ' + (urlParams.get('gonderici') || 'XALİD MÜƏLLİM').toUpperCase();

        const candyContainer = document.getElementById('candy-rain');
        function createFallingCandy() {
            const candy = document.createElement('div');
            candy.className = 'falling-candy';
            const size = Math.random() * 12 + 6 + 'px';
            candy.style.width = size;
            candy.style.height = size;
            candy.style.left = Math.random() * 100 + 'vw';
            const colors = ['#ffd700', '#dcb361', '#a3ff81', '#ff9a9e', '#ffffff'];
            candy.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random() * colors.length)]} 0%, rgba(220,179,97,0.2) 80%)`;
            candy.style.animationDuration = (Math.random() * 5 + 4) + 's';
            candyContainer.appendChild(candy);
            setTimeout(() => candy.remove(), 9000);
        }
        setInterval(createFallingCandy, 300);

        function fire3DGlitterExplosion() {
            const colors = ['#ffd700', '#c0c0c0', '#a3ff81', '#dcb361', '#ffffff', '#ff9a9e', '#85e3ff'];
            const types = ['round', 'strip'];
            const count = window.innerWidth > 768 ? 90 : 45;

            for (let i = 0; i < count; i++) {
                const glitter = document.createElement('div');
                const type = types[Math.floor(Math.random() * types.length)];
                glitter.className = 'magic-glitter ' + (type === 'round' ? 'glitter-round' : 'glitter-strip');

                if (type === 'round') {
                    const size = Math.random() * 16 + 6 + 'px';
                    glitter.style.width = size; glitter.style.height = size;
                } else {
                    glitter.style.height = Math.random() * 35 + 20 + 'px';
                }

                glitter.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                glitter.style.color = glitter.style.backgroundColor;

                const tx = (Math.random() - 0.5) * window.innerWidth * 1.6 + 'px';
                const ty = (Math.random() - 0.5) * window.innerHeight * 1.6 + 'px';
                const tz = Math.random() * 900 + 400 + 'px';
                const rot = Math.random() * 720 + 'deg';
                const scale = Math.random() * 2 + 1;

                glitter.style.setProperty('--tx', tx);
                glitter.style.setProperty('--ty', ty);
                glitter.style.setProperty('--tz', tz);
                glitter.style.setProperty('--rot', rot);
                glitter.style.setProperty('--s', scale);

                glitter.style.animation = `explode3D ${Math.random() * 1.5 + 1.5}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;

                document.body.appendChild(glitter);
                setTimeout(() => glitter.remove(), 3200);
            }
        }

        const btn = document.getElementById('open-btn');
        const welcome = document.getElementById('welcome-screen');
        const envWrapper = document.getElementById('envelope-wrapper');
        const card = document.getElementById('invitation-card');
        const closeBtn = document.querySelector('.close-btn');

        btn.addEventListener('click', () => {
            welcome.style.opacity = '0';
            setTimeout(() => welcome.style.display = 'none', 500);

            envWrapper.style.display = 'flex';
            setTimeout(() => {
                envWrapper.style.opacity = '1';
                envWrapper.classList.add('step-1'); // Zərf daxil olur
            }, 50);

            // Zərf açılır (1.0s)
            setTimeout(() => {
                envWrapper.classList.add('step-2');
            }, 1000);

            // Kağız çıxır və üstündə ? ? ? görünür (1.8s)
            setTimeout(() => {
                envWrapper.classList.add('step-3');
            }, 1800);

            // Zərf sönüb itir (2.8s)
            setTimeout(() => {
                envWrapper.classList.add('fade-envelope');
            }, 2800);

            // Tam 3.5-ci saniyədə zərf tamamilə yoxa çıxır, kağız böyüyüb açılır + Zərlər partlayır!
            setTimeout(() => {
                envWrapper.style.display = 'none';
                card.style.display = 'flex';
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.classList.add('open');
                    fire3DGlitterExplosion();
                }, 50);
            }, 3500);
        });

        closeBtn.addEventListener('click', () => {
            card.classList.remove('open');
            card.style.opacity = '0';
            setTimeout(() => {
                card.style.display = 'none';
                envWrapper.classList.remove('step-1', 'step-2', 'step-3', 'fade-envelope');
                welcome.style.display = 'flex';
                setTimeout(() => welcome.style.opacity = '1', 50);
            }, 600);
        });
    </script>
</body>

</html>
